# Kamernet Radar — full-stack local setup
#
# Basic:   docker compose up               # starts db + scraper
# With dashboard: docker compose --profile dashboard up
# First-time schema init: docker compose run --rm scraper python -m radar init-db
#
# The dashboard is bound to 127.0.0.1 by default so it is NOT reachable from the public
# internet even if you expose the host. If you want remote access, wrap it in a reverse
# proxy with auth (see docs/DEPLOYMENT.md).

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radar}
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - radar-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d ${POSTGRES_DB:-radar}"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override host-side DATABASE_URL so the container reaches the db service
      DATABASE_URL: postgres://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD:-radar}@db:5432/${POSTGRES_DB:-radar}

  dashboard:
    profiles: [dashboard]
    build:
      context: ./dashboard
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD:-radar}@db:5432/${POSTGRES_DB:-radar}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  radar-db:
