name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      placeholder: |
        1. Set PROFILE=...
        2. Run `python -m radar ...`
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Please paste the last ~50 lines of scraper output. Redact secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v1.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Docker compose (local)
        - Docker compose (VPS)
        - Plain `python -m radar` on my laptop
        - Coolify / Railway / fly.io / other PaaS
        - Other (describe in "What happened?")
    validations:
      required: true
