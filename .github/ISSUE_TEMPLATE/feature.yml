name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the situation that led to this idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: checkboxes
    id: scope
    attributes:
      label: Does your idea touch any of these?
      options:
        - label: A new notification channel
        - label: A new scraping provider (Pararius, Funda, HousingAnywhere, …)
        - label: The dashboard UI
        - label: The scoring / LLM side
        - label: Deployment / ops
