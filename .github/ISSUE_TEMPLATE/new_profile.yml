name: New scoring profile
description: Contribute or request a preset profile for a specific city / situation
labels: ["profile", "good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        Ship new rubrics for different cities, family setups, student cohorts, etc.
        Start from `profiles/generic.yaml`, edit it, and send a PR.
  - type: input
    id: profile_name
    attributes:
      label: Profile filename
      placeholder: e.g. rotterdam-student
      description: Lowercase, hyphens. Will become `profiles/<name>.yaml`.
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Who is this for?
      placeholder: "Students at EUR with €800-1200 budget, looking for private studios…"
    validations:
      required: true
  - type: textarea
    id: search
    attributes:
      label: Search parameters
      placeholder: "city_slug, radius, max_rent, min_size, listing_types…"
  - type: textarea
    id: rubric_notes
    attributes:
      label: Scoring notes
      description: Specific postcodes, neighborhoods, deal-breakers, priority factors.
  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I've read `docs/PROFILES.md` and understand the schema
        - label: No personal identifiers (names, addresses, phone numbers) in the profile
        - label: No commercial brand names / specific employer names as deal-breakers
