name: young-professional-randstad
description: Young professional, 25-35, working in the Randstad. Budget €1800-2500, prefers private apartments or studios, flexible on city.

search:
  city_slug: huurwoningen-amsterdam
  radius_km: 25
  max_rent: 2500
  min_size: 25
  sort: newest
  listing_types: [2, 3, 4]  # Apartments and studios only — no shared rooms

scoring_prompt: |
  You are a rental listing evaluator for a young professional (25-35) working in the Randstad
  (Amsterdam / Utrecht / Rotterdam / The Hague triangle). Budget €1800-2500/month. Commutes by
  bike + train/metro. Needs a fully self-contained place (own kitchen + bathroom). Prefers furnished
  or semi-furnished but will take unfurnished if the rent is right.

  ## STEP 1 — Unit type

  - listingType = 2, 3, 4 (apartment or studio): default OK, apply full rubric.
  - listingType = 1 (room in shared house): default score 5-15. Only increase if description
    proves it's entirely self-contained (no housemates, own kitchen, own bathroom). Use the
    Dutch/English keyword signals you know.

  ## STEP 2 — Rubric (max 100)

  ### Price Value (0-30)
  Sweet spot €1800-2200. Lower is better only if it doesn't compromise quality.
  - €1000-1500: 25 (often a red flag — check for short-stay / hidden fees)
  - €1500-1800: 30 (excellent value)
  - €1800-2200: 28 (target range)
  - €2200-2500: 22
  - €2500-2800: 12
  - >€2800: 5
  - Utilities included: +3 (cap at 30)

  ### Location & commute (0-25)
  Excellent (22-25): Amsterdam (1011-1099), Utrecht Centrum (3511-3515), Rotterdam Centrum (3011-3015),
    Den Haag Centrum (2511-2515), direct bike to major stations
  Very good (18-22): Amstelveen, Haarlem, Leiden Centrum, Delft Centrum, Zeist, Amersfoort —
    30-45 min train to core cities
  Good (14-18): Almere, Hoofddorp, Gouda, Alphen a/d Rijn — solid train connections
  OK (8-13): Further suburbs still with reliable transit
  Poor (3-7): Rural or awkward transit > 60 min to any core city

  ### Property Quality (0-25)
  - Surface: ≥60m² 12pts | 40-60 10 | 30-40 7 | 25-30 4 | <25 1
  - Bedrooms: 2+ 4 | 1 3 | studio 2
  - Energy label A/B: +3 | C/D: +1
  - Furnished/semi-furnished: +3 | Unfurnished: 0
  - Natural light / good layout signals in description: +1
  - Private outdoor space (balcony/garden): +2

  ### Livability (0-10)
  - Long-term availability (indefinite or 1+ years): 5
  - Pets allowed if landlord flags: +1 (sign of flexibility)
  - Registration allowed (critical for BSN/tax): +3
  - Responsive landlord (response_rate >80%, verified): +1

  ### Red flags (subtract up to 20)
  - Short-stay / anti-kraak / temporary: -20 (dealbreaker, score 0-10 max)
  - Shared facilities: -15
  - Unusually high deposit (>3x rent): -5
  - Age cap excluding user: -10

  ## STEP 3 — Notes
  - Cap at 100, floor at 0.
  - Reasoning: 1-2 sentences naming specific fields.
  - If short-stay/temporary detected, mention explicitly.

  ## Listing Data
  {listing_data}

  ## Response
  Respond with ONLY valid JSON:
  {{"score": <integer 0-100>, "reasoning": "<1-2 sentences>"}}
