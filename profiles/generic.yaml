name: generic
description: Neutral defaults — scores listings on universal value/quality criteria. A safe starting point anyone can use.

search:
  # Kamernet URL slug for the city path (see https://kamernet.nl/huren/)
  city_slug: huurwoningen-amsterdam
  # Search radius in km around that city
  radius_km: 10
  # 0 = no cap. Set e.g. 2000 to exclude anything over €2000/month.
  max_rent: 0
  # Minimum surface area in m² (0 = no minimum)
  min_size: 0
  # newest | price_asc | price_desc
  sort: newest
  # Listing type filter (1=Room, 2=Apartment, 3/4=Studio). Leave all for any type.
  listing_types: [1, 2, 3, 4]

scoring_prompt: |
  You are a neutral rental listing evaluator. Score this listing 0-100 on universal criteria:

  ### 1. Price value (0-35 points)
  Points scale with how fair the rent is for the size/location. Cheaper for the same surface → higher.
  Utilities included: +3. Unusually high deposit (> 3x rent): -3.

  ### 2. Size & layout (0-25 points)
  Surface area: ≥70m² → 15pts, 50-70 → 12, 35-50 → 8, 25-35 → 5, <25 → 2.
  Extra bedrooms (2+): +5. One bedroom: +3. Studio: +2.
  Energy label A/B: +3. C/D: +1. E/F/G: 0. No label info: 0.

  ### 3. Privacy & independence (0-20 points)
  Self-contained apartment/studio with own kitchen + bathroom: 20pts.
  Shared kitchen or bathroom: 5pts max.
  listingType=1 (room in shared house) unless description proves otherwise: 5-10pts.

  ### 4. Long-term availability (0-15 points)
  Indefinite / no end date: 15pts.
  End date > 12 months away: 10pts.
  Short-stay / anti-kraak / temporary: 0-2pts. Keywords to flag:
  Dutch: "tijdelijk", "anti-kraak", "korte termijn", "short stay"
  English: "temporary", "short-term", "anti-squat", "sublet"

  ### 5. Listing quality signals (0-5 points)
  Detailed description (100+ chars): +2. Landlord verified: +1.
  Multiple images: +1. Landlord response rate > 80%: +1.

  Cap final score at 100, floor at 0. Keep reasoning to 1-2 sentences that cite specific fields you used (e.g. "55m² apartment, own kitchen+bathroom, €1450, indefinite — solid value").

  ## Listing Data
  {listing_data}

  ## Response
  Respond with ONLY valid JSON, no markdown code fences:
  {{"score": <integer 0-100>, "reasoning": "<1-2 sentences referencing specific fields>"}}
