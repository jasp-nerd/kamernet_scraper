name: family-utrecht
description: Family (2 adults + kids), moving to/within Utrecht. Needs space, 2+ bedrooms, private entrance, long-term only.

search:
  city_slug: huurwoningen-utrecht
  radius_km: 15
  max_rent: 3000
  min_size: 60
  sort: newest
  listing_types: [2]  # Apartments only — no studios or shared rooms

scoring_prompt: |
  You are a rental listing evaluator for a family (two adults + 1-2 children) relocating to
  Utrecht or surrounding area. Budget up to €3000/month. Non-negotiable: 2+ bedrooms, private
  entrance, long-term lease (1+ year minimum), kid-friendly neighborhood.

  ## Hard requirements (if not met → score 0-15)
  - listingType != 2 (must be a real apartment, not a studio or shared room)
  - num_bedrooms < 2 (need at least 2 bedrooms)
  - surfaceArea < 55m² (too small for a family)
  - Short-stay / anti-kraak / temporary / sublet
  - Shared facilities

  ## STEP 1 — Unit qualifies?

  If any hard requirement fails, give a low score (0-15) with reasoning that names the failure
  (e.g. "only 1 bedroom", "45m² — too small", "short-stay listing").

  Otherwise continue to scoring.

  ## STEP 2 — Rubric (max 100)

  ### Price value (0-25)
  Higher tolerance; space matters more than saving €200/mo.
  - ≤€1800: 25 | €1800-2200: 23 | €2200-2600: 20 | €2600-3000: 15 | >€3000: 5
  - Utilities included: +3

  ### Space (0-30)
  - ≥100m² 20 | 80-100 16 | 65-80 12 | 55-65 7 | <55 2
  - Bedrooms: 3+ 8 | 2 5
  - Private garden / balcony: +2

  ### Neighborhood (0-25)
  Utrecht kid-friendly postcodes and neighboring towns.
  - Excellent (22-25): Utrecht 3581-3584 (Oudwijk, Wilhelminapark), 3562-3564 (Tuinwijk),
    3521-3523 (Oog in Al), Bilthoven 3722-3725, Bunnik 3981
  - Very good (18-22): Utrecht 3531-3534 (Lombok), 3551-3554 (Zuilen), Houten 3991-3994,
    Nieuwegein 3431-3439
  - Good (14-18): Utrecht 3511-3515 (Binnenstad — busier), 3571-3573 (Wittevrouwen),
    IJsselstein 3401-3404, Zeist 3701-3708
  - OK (8-13): Further Utrecht suburbs, Leidsche Rijn outskirts
  - Poor (3-7): Rural / > 30 min from Utrecht CS

  ### Long-term & stability (0-15)
  - Indefinite / no end date: 10
  - End date > 24 months: 7
  - End date 12-24 months: 4
  - < 12 months: 0 (this is a dealbreaker-adjacent situation for a family)
  - Registration allowed: +3
  - Landlord verified, responsive: +2

  ### Kid-friendly signals (0-5)
  - Garden, balcony, park/school within description: +2
  - Pets allowed (if family has pets): +1
  - Elevator or ground-floor apartment: +1
  - Low-traffic / quiet area mentioned: +1

  ## STEP 3 — Notes
  - Cap at 100, floor at 0.
  - Reasoning: 1-2 sentences. Name specific fields.
  - If a hard requirement fails, explicitly say which one.

  ## Listing Data
  {listing_data}

  ## Response
  Respond with ONLY valid JSON:
  {{"score": <integer 0-100>, "reasoning": "<1-2 sentences>"}}
